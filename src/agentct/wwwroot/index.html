<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Agent Control Tower</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #f4f6f9;
            color: #333;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 16px;
        }

        h1 {
            font-size: 1.6rem;
            font-weight: 600;
            margin-bottom: 24px;
            color: #1a1a2e;
        }

        .card {
            background: #fff;
            border-radius: 10px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.08);
            padding: 28px;
            width: 100%;
            max-width: 680px;
        }

        label {
            display: block;
            font-size: 0.85rem;
            font-weight: 600;
            margin-bottom: 6px;
            color: #555;
            text-transform: uppercase;
            letter-spacing: 0.04em;
        }

        select, textarea {
            width: 100%;
            border: 1px solid #d1d5db;
            border-radius: 6px;
            padding: 10px 12px;
            font-size: 0.95rem;
            color: #333;
            background: #fafafa;
            outline: none;
            transition: border-color 0.2s;
        }

        select:focus, textarea:focus {
            border-color: #4f7df3;
            background: #fff;
        }

        select { margin-bottom: 18px; }

        textarea {
            resize: vertical;
            min-height: 100px;
            margin-bottom: 18px;
        }

        button {
            background: #4f7df3;
            color: #fff;
            border: none;
            border-radius: 6px;
            padding: 10px 22px;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
        }

        button:hover:not(:disabled) { background: #3a65d6; }
        button:disabled { background: #a5b4fc; cursor: not-allowed; }

        .response-box {
            margin-top: 24px;
            border-top: 1px solid #e5e7eb;
            padding-top: 20px;
            display: none;
        }

        .response-box.visible { display: block; }

        .response-label {
            font-size: 0.8rem;
            font-weight: 600;
            color: #888;
            text-transform: uppercase;
            letter-spacing: 0.04em;
            margin-bottom: 10px;
        }

        .response-text {
            background: #f8fafc;
            border: 1px solid #e5e7eb;
            border-radius: 6px;
            padding: 14px;
            font-size: 0.92rem;
            line-height: 1.65;
            white-space: pre-wrap;
            color: #222;
            min-height: 60px;
        }

        .spinner {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid rgba(255,255,255,0.5);
            border-top-color: #fff;
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
            margin-right: 8px;
            vertical-align: middle;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        .error { color: #dc2626; }
    </style>
</head>
<body>
    <h1>Agent Control Tower</h1>
    <div class="card">
        <label for="agent-select">Agent</label>
        <select id="agent-select">
            <option value="support">Support Agent</option>
            <option value="doc">Documentation Agent</option>
            <option value="customer">Customer Agent</option>
        </select>

        <label for="prompt-input">Prompt</label>
        <textarea id="prompt-input" placeholder="Type your question here..."></textarea>

        <button id="send-btn" onclick="sendPrompt()">Send</button>

        <div class="response-box" id="response-box">
            <div class="response-label">Response</div>
            <div class="response-text" id="response-text"></div>
        </div>
    </div>

    <script>
        async function sendPrompt() {
            const agent = document.getElementById('agent-select').value;
            const prompt = document.getElementById('prompt-input').value.trim();
            const btn = document.getElementById('send-btn');
            const box = document.getElementById('response-box');
            const out = document.getElementById('response-text');

            if (!prompt) return;

            btn.disabled = true;
            btn.innerHTML = '<span class="spinner"></span>Thinking...';
            box.classList.add('visible');
            out.textContent = '';
            out.classList.remove('error');

            try {
                const res = await fetch(`/${agent}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: prompt })
                });

                if (!res.ok) {
                    throw new Error(`HTTP ${res.status}: ${res.statusText}`);
                }

                const data = await res.json();
                out.textContent = data.response ?? JSON.stringify(data, null, 2);
            } catch (err) {
                out.textContent = `Error: ${err.message}`;
                out.classList.add('error');
            } finally {
                btn.disabled = false;
                btn.textContent = 'Send';
            }
        }

        document.getElementById('prompt-input').addEventListener('keydown', function (e) {
            if (e.key === 'Enter' && (e.ctrlKey || e.metaKey)) {
                sendPrompt();
            }
        });
    </script>
</body>
</html>
